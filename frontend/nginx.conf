server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /backend/api/ {
        proxy_pass http://cook-with-me-backend.cook-with-me.svc.cluster.local:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint:
    # Browser calls:
    #   http://<frontend-lb>/backend/health
    #
    # Nginx proxies internally to:
    #   http://cook-with-me-backend:8080/health
    location /backend/health {
        proxy_pass http://cook-with-me-backend.cook-with-me.svc.cluster.local:8080/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}