services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: cook-with-me-backend
    restart: unless-stopped
    ports:
      - "80:8080"
    env_file:
      - /opt/cook-with-me/runtime.env
    environment:
      PORT: "8080"
      FLASK_ENV: "production"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
