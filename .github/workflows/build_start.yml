name: build_start

# One-time / manually-triggered initial environment build. Run this after
# scripts/bootstrap-aws.sh, which prepares the OIDC role, state bucket, and
# secrets this workflow consumes. Later changes go through update.yml.
#
# Always deploys on the default CloudFront domains - never decides to enable
# a custom domain itself, regardless of ENABLE_CUSTOM_DOMAIN. A domain is an
# optional enhancement, not a requirement to go live; only
# provision_domain.yml is allowed to turn it on.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: cook-with-me-dev-environment
  cancel-in-progress: false

jobs:
  build_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify bootstrap variables are configured
        run: |
          missing=0
          for name in AWS_REGION AWS_GITHUB_ACTIONS_ROLE_ARN TF_STATE_BUCKET TF_DEV_STATE_KEY PROJECT_NAME ENVIRONMENT SECRET_NAME; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::Required repository variable $name is not set."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Run ./scripts/bootstrap-aws.sh first - it creates the OIDC role, state bucket, runtime secret, and writes these repository variables automatically."
            exit 1
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_DEV_STATE_KEY: ${{ vars.TF_DEV_STATE_KEY }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          SECRET_NAME: ${{ vars.SECRET_NAME }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
          terraform_wrapper: false

      - name: Generate backend.tf
        working-directory: infra/terraform/environments/dev
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket       = "${{ vars.TF_STATE_BUCKET }}"
              key          = "${{ vars.TF_DEV_STATE_KEY }}"
              region       = "${{ vars.AWS_REGION }}"
              encrypt      = true
              use_lockfile = true
            }
          }
          EOF

      - name: Terraform init
        working-directory: infra/terraform/environments/dev
        run: terraform init -input=false

      # Preserve whatever is already in state - see provision_domain.yml.
      - name: Determine current custom domain state
        id: domain_state
        working-directory: infra/terraform/environments/dev
        run: |
          CURRENT="$(terraform output -raw custom_domain_enabled 2>/dev/null || true)"
          if [ "$CURRENT" != "true" ]; then
            CURRENT="false"
          fi
          echo "enabled=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Custom domain currently enabled in state: $CURRENT"

      - name: Generate terraform.tfvars
        working-directory: infra/terraform/environments/dev
        run: |
          FRONTEND_PUBLIC_BASE_URL="${{ vars.FRONTEND_PUBLIC_BASE_URL }}"
          if [ -z "$FRONTEND_PUBLIC_BASE_URL" ] && [ -n "${{ vars.ROOT_DOMAIN }}" ] && [ -n "${{ vars.FRONTEND_SUBDOMAIN }}" ]; then
            FRONTEND_PUBLIC_BASE_URL="https://${{ vars.FRONTEND_SUBDOMAIN }}.${{ vars.ROOT_DOMAIN }}"
          fi

          cat > terraform.tfvars <<EOF
          project_name         = "${{ vars.PROJECT_NAME }}"
          environment          = "${{ vars.ENVIRONMENT }}"
          aws_region           = "${{ vars.AWS_REGION }}"
          enable_custom_domain = ${{ steps.domain_state.outputs.enabled }}
          root_domain          = "${{ vars.ROOT_DOMAIN }}"
          frontend_subdomain   = "${{ vars.FRONTEND_SUBDOMAIN }}"
          frontend_public_base_url = "$FRONTEND_PUBLIC_BASE_URL"
          route53_dns_role_arn = "${{ vars.ROUTE53_DNS_ROLE_ARN }}"
          app_secret_name      = "${{ vars.SECRET_NAME }}"
          EOF

      - name: Terraform validate
        working-directory: infra/terraform/environments/dev
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform/environments/dev
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: infra/terraform/environments/dev
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: infra/terraform/environments/dev
        run: |
          {
            echo "backend_ecr_repository_url=$(terraform output -raw backend_ecr_repository_url)"
            echo "backend_instance_id=$(terraform output -raw backend_instance_id)"
            echo "backend_api_base_url=$(terraform output -raw backend_api_base_url)"
            echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "cognito_app_client_id=$(terraform output -raw cognito_app_client_id)"
            echo "static_site_bucket_name=$(terraform output -raw static_site_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "frontend_base_url=$(terraform output -raw frontend_base_url)"
          } >> "$GITHUB_OUTPUT"

      - name: Align Cognito app client URLs
        run: |
          FRONTEND_URL="${{ steps.tf_outputs.outputs.frontend_base_url }}"

          aws cognito-idp update-user-pool-client \
            --user-pool-id "${{ steps.tf_outputs.outputs.cognito_user_pool_id }}" \
            --client-id "${{ steps.tf_outputs.outputs.cognito_app_client_id }}" \
            --supported-identity-providers COGNITO \
            --callback-urls "$FRONTEND_URL/auth/callback" \
            --logout-urls "$FRONTEND_URL" \
            --allowed-o-auth-flows-user-pool-client \
            --allowed-o-auth-flows code \
            --allowed-o-auth-scopes openid email profile \
            --explicit-auth-flows ALLOW_USER_SRP_AUTH ALLOW_USER_PASSWORD_AUTH ALLOW_REFRESH_TOKEN_AUTH \
            --prevent-user-existence-errors ENABLED \
            --access-token-validity 60 \
            --id-token-validity 60 \
            --refresh-token-validity 30 \
            --token-validity-units AccessToken=minutes,IdToken=minutes,RefreshToken=days

      - name: Build and push backend image
        working-directory: backend
        run: |
          IMAGE_URL="${{ steps.tf_outputs.outputs.backend_ecr_repository_url }}"
          ECR_REGISTRY="$(echo "$IMAGE_URL" | cut -d/ -f1)"
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker build -t "$IMAGE_URL:${{ github.sha }}" -t "$IMAGE_URL:latest" .
          docker push "$IMAGE_URL:${{ github.sha }}"
          docker push "$IMAGE_URL:latest"

      - name: Deploy backend via SSM
        run: |
          INSTANCE_ID="${{ steps.tf_outputs.outputs.backend_instance_id }}"
          ECR_REGISTRY="$(echo "${{ steps.tf_outputs.outputs.backend_ecr_repository_url }}" | cut -d/ -f1)"

          SSM_SCRIPT="$(cat <<'SSM_SCRIPT'
          set -euo pipefail

          ECR_REGISTRY="__ECR_REGISTRY__"
          AWS_REGION="__AWS_REGION__"

          for i in {1..60}; do
            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1 && test -f /opt/cook-with-me/docker-compose.yml; then
              break
            fi

            echo "waiting for docker and user_data ($i/60)"
            sleep 10
          done

          command -v docker
          docker compose version
          test -f /opt/cook-with-me/docker-compose.yml

          cd /opt/cook-with-me

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker compose pull
          docker compose up -d
          SSM_SCRIPT
          )"
          SSM_SCRIPT="${SSM_SCRIPT//__ECR_REGISTRY__/$ECR_REGISTRY}"
          SSM_SCRIPT="${SSM_SCRIPT//__AWS_REGION__/${{ vars.AWS_REGION }}}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy cook-with-me backend (build_start)" \
            --parameters "$(jq -n --arg script "$SSM_SCRIPT" '{commands:[$script]}')" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
            exit 1
          fi

      - name: Smoke test - backend health
        run: |
          URL="${{ steps.tf_outputs.outputs.backend_api_base_url }}/health"
          for i in $(seq 1 12); do
            if curl -fsS "$URL"; then exit 0; fi
            sleep 10
          done
          echo "Backend health check failed" && exit 1

      - name: Smoke test - public recipes endpoint
        run: curl -fsS "${{ steps.tf_outputs.outputs.backend_api_base_url }}/api/recipes" > /dev/null

      - name: Smoke test - protected endpoint rejects unauthenticated requests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.tf_outputs.outputs.backend_api_base_url }}/api/recipes/mine")
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401 for unauthenticated /api/recipes/mine, got $STATUS"
            exit 1
          fi

      - name: Write frontend production env
        working-directory: frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${{ steps.tf_outputs.outputs.backend_api_base_url }}
          VITE_COGNITO_REGION=${{ vars.AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID=${{ steps.tf_outputs.outputs.cognito_user_pool_id }}
          VITE_COGNITO_APP_CLIENT_ID=${{ steps.tf_outputs.outputs.cognito_app_client_id }}
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist "s3://${{ steps.tf_outputs.outputs.static_site_bucket_name }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Smoke test - frontend is reachable
        run: curl -fsS "${{ steps.tf_outputs.outputs.frontend_base_url }}" > /dev/null

      - name: Deployment summary
        run: |
          echo "Frontend:    ${{ steps.tf_outputs.outputs.frontend_base_url }}"
          echo "Backend API: ${{ steps.tf_outputs.outputs.backend_api_base_url }}"
          echo "Day-to-day changes from here on are deployed by update.yml."
          echo "Run provision_domain.yml separately if/when a custom domain should be attached."
