name: provision_domain

# Optional domain/DNS provisioning - the app already works on the default
# CloudFront domain without this ever running. This is the ONLY workflow
# that passes enable_custom_domain=true to Terraform; build_start.yml and
# update.yml only ever preserve whatever is already in state, so once this
# has run once, later deploys won't tear the domain back down.
#
# If ENABLE_CUSTOM_DOMAIN is not "true" (cloudfront-only, the default), this
# exits cleanly - nothing to provision, not an error.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: cook-with-me-dev-environment
  cancel-in-progress: false

jobs:
  provision_domain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify bootstrap variables are configured
        run: |
          missing=0
          for name in AWS_REGION AWS_GITHUB_ACTIONS_ROLE_ARN TF_STATE_BUCKET TF_DEV_STATE_KEY; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::Required repository variable $name is not set. Run ./scripts/bootstrap-aws.sh first."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_DEV_STATE_KEY: ${{ vars.TF_DEV_STATE_KEY }}

      - name: Check whether a custom domain is configured
        run: |
          if [ "${{ vars.ENABLE_CUSTOM_DOMAIN }}" != "true" ]; then
            echo "ENABLE_CUSTOM_DOMAIN is not 'true' (DNS_MODE=${{ vars.DNS_MODE }})."
            echo "Nothing to provision - the app already works via the default CloudFront domain."
            echo "Re-run scripts/bootstrap-aws.sh with ROOT_DOMAIN set if you want a custom domain."
          fi

      - name: Configure AWS credentials (OIDC)
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Generate backend.tf
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket       = "${{ vars.TF_STATE_BUCKET }}"
              key          = "${{ vars.TF_DEV_STATE_KEY }}"
              region       = "${{ vars.AWS_REGION }}"
              encrypt      = true
              use_lockfile = true
            }
          }
          EOF

      - name: Generate terraform.tfvars
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: |
          FRONTEND_PUBLIC_BASE_URL="${{ vars.FRONTEND_PUBLIC_BASE_URL }}"
          if [ -z "$FRONTEND_PUBLIC_BASE_URL" ] && [ -n "${{ vars.ROOT_DOMAIN }}" ] && [ -n "${{ vars.FRONTEND_SUBDOMAIN }}" ]; then
            FRONTEND_PUBLIC_BASE_URL="https://${{ vars.FRONTEND_SUBDOMAIN }}.${{ vars.ROOT_DOMAIN }}"
          fi

          cat > terraform.tfvars <<EOF
          project_name         = "${{ vars.PROJECT_NAME }}"
          environment          = "${{ vars.ENVIRONMENT }}"
          aws_region           = "${{ vars.AWS_REGION }}"
          enable_custom_domain = ${{ vars.ENABLE_CUSTOM_DOMAIN }}
          root_domain          = "${{ vars.ROOT_DOMAIN }}"
          frontend_subdomain   = "${{ vars.FRONTEND_SUBDOMAIN }}"
          frontend_public_base_url = "$FRONTEND_PUBLIC_BASE_URL"
          route53_dns_role_arn = "${{ vars.ROUTE53_DNS_ROLE_ARN }}"
          app_secret_name      = "${{ vars.SECRET_NAME }}"
          EOF

      - name: Terraform init
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform validate
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform validate

      - name: Terraform plan
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        id: tf_outputs
        working-directory: infra/terraform/environments/dev
        run: |
          {
            echo "backend_api_base_url=$(terraform output -raw backend_api_base_url)"
            echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "cognito_app_client_id=$(terraform output -raw cognito_app_client_id)"
            echo "static_site_bucket_name=$(terraform output -raw static_site_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "frontend_base_url=$(terraform output -raw frontend_base_url)"
            echo "custom_frontend_domain=$(terraform output -raw custom_frontend_domain)"
          } >> "$GITHUB_OUTPUT"

      - name: Align Cognito app client URLs
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: |
          FRONTEND_URL="${{ steps.tf_outputs.outputs.frontend_base_url }}"

          aws cognito-idp update-user-pool-client \
            --user-pool-id "${{ steps.tf_outputs.outputs.cognito_user_pool_id }}" \
            --client-id "${{ steps.tf_outputs.outputs.cognito_app_client_id }}" \
            --supported-identity-providers COGNITO \
            --callback-urls "$FRONTEND_URL/auth/callback" \
            --logout-urls "$FRONTEND_URL" \
            --allowed-o-auth-flows-user-pool-client \
            --allowed-o-auth-flows code \
            --allowed-o-auth-scopes openid email profile \
            --explicit-auth-flows ALLOW_USER_SRP_AUTH ALLOW_USER_PASSWORD_AUTH ALLOW_REFRESH_TOKEN_AUTH \
            --prevent-user-existence-errors ENABLED \
            --access-token-validity 60 \
            --id-token-validity 60 \
            --refresh-token-validity 30 \
            --token-validity-units AccessToken=minutes,IdToken=minutes,RefreshToken=days

      - name: Write frontend production env
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${{ steps.tf_outputs.outputs.backend_api_base_url }}
          VITE_COGNITO_REGION=${{ vars.AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID=${{ steps.tf_outputs.outputs.cognito_user_pool_id }}
          VITE_COGNITO_APP_CLIENT_ID=${{ steps.tf_outputs.outputs.cognito_app_client_id }}
          EOF

      - name: Setup Node
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: aws s3 sync frontend/dist "s3://${{ steps.tf_outputs.outputs.static_site_bucket_name }}" --delete

      - name: Invalidate CloudFront
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Smoke test - custom frontend is reachable
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: curl -fsS "${{ steps.tf_outputs.outputs.frontend_base_url }}" > /dev/null

      - name: Smoke test - custom backend health
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: curl -fsS "${{ steps.tf_outputs.outputs.backend_api_base_url }}/health" > /dev/null

      - name: Show custom domain
        if: vars.ENABLE_CUSTOM_DOMAIN == 'true'
        run: |
          echo "Custom frontend domain: ${{ steps.tf_outputs.outputs.custom_frontend_domain }}"
          echo "Frontend base URL:      ${{ steps.tf_outputs.outputs.frontend_base_url }}"
          echo "Backend API base URL:   ${{ steps.tf_outputs.outputs.backend_api_base_url }}"
          echo "DNS validation can take a few minutes to propagate."
